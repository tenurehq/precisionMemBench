version: "3.9"

services:
  smriti:
    build: .
    image: smriti-wrapper:latest
    ports:
      - "8080:8080"
    environment:
      SMRITI_SIMILARITY_THRESHOLD: "0.45"
      SMRITI_EMBED_MODEL: "all-MiniLM-L6-v2"
      SMRITI_PORT: "8080"
    # No external infrastructure needed — ChromaDB runs fully in-process.
    # The embedding model is baked into the Docker image at build time.
