services:
  neo4j:
    image: neo4j@sha256:0b5d3ab6ec1b866890dbfb53bf4fe1cf039f9e03c96165599a403005b7e7bcc3
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:7474",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    volumes:
      - neo4j_data:/data

  zep:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LLM_MODEL: "us.anthropic.claude-sonnet-4-6"
      LLM_BASE_URL: "http://host.docker.internal:8000/api/v1"
      LLM_API_KEY: "123456"
      EMBEDDER_BASE_URL: "http://host.docker.internal:11434/v1"
      EMBEDDER_MODEL: "mxbai-embed-large"
      EMBEDDER_DIM: "1024"
      EMBEDDER_API_KEY: "ollama"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"

volumes:
  neo4j_data:
